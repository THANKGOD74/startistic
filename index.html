<body class=" flex flex-col md:flex-row items-center justify-center bg-[hsl(233,47%,7%)] md:h-screen">

    <section>
      <img class="w-[100%] block md:hidden relative rounded-tl-md rounded-tr-md md:rounded-none" src="/images/image-header-mobile.jpg" alt="">
